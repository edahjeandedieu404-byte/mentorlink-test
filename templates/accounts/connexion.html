{% extends "base.html" %}
{% block title %}Connexion - MentorLink{% endblock %}

{% block content %}
<div style="max-width:400px; margin:0 auto;">
    <div class="card">
        <h3 style="margin-bottom:20px;">Connexion</h3>
        <form method="post">
            {% csrf_token %}
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
            <label>Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
            {% if form.errors %}
            <div class="alert alert-danger">Email ou mot de passe incorrect.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%;">Se connecter</button>
        </form>
        <p style="margin-top:15px; text-align:center;">
            Pas encore de compte ? <a href="{% url 'inscription' %}">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
