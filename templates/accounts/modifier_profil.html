{% extends "base.html" %}
{% block title %}Modifier mon profil - MentorLink{% endblock %}

{% block content %}
<div style="max-width:500px; margin:0 auto;">
    <div class="card">
        <h3 style="margin-bottom:20px;">Modifier mon profil</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label>Téléphone</label>
            <input type="text" name="telephone" class="form-control" value="{{ user.telephone }}">
            <label>Filière</label>
            <select name="filiere" class="form-control">
                <option value="">-- Choisir --</option>
                <option value="GL" {% if user.filiere == 'GL' %}selected{% endif %}>Génie Logiciel</option>
                <option value="IA" {% if user.filiere == 'IA' %}selected{% endif %}>Intelligence Artificielle</option>
                <option value="IM" {% if user.filiere == 'IM' %}selected{% endif %}>Internet et Multimédia</option>
                <option value="SI" {% if user.filiere == 'SI' %}selected{% endif %}>Sécurité Informatique</option>
                <option value="SE" {% if user.filiere == 'SE' %}selected{% endif %}>Systèmes Embarqués et IoT</option>
            </select>
            <label>Niveau</label>
            <select name="niveau" class="form-control">
                <option value="">-- Choisir --</option>
                <option value="L1" {% if user.niveau == 'L1' %}selected{% endif %}>Licence 1</option>
                <option value="L2" {% if user.niveau == 'L2' %}selected{% endif %}>Licence 2</option>
                <option value="L3" {% if user.niveau == 'L3' %}selected{% endif %}>Licence 3</option>
                <option value="M1" {% if user.niveau == 'M1' %}selected{% endif %}>Master 1</option>
                <option value="M2" {% if user.niveau == 'M2' %}selected{% endif %}>Master 2</option>
            </select>
            <label>Compétences</label>
            <textarea name="competences" class="form-control" rows="3">{{ user.competences }}</textarea>
            <label>Lacunes</label>
            <textarea name="lacunes" class="form-control" rows="3">{{ user.lacunes }}</textarea>
            <label>Disponibilités</label>
            <textarea name="disponibilites" class="form-control" rows="3">{{ user.disponibilites }}</textarea>
            <label>Bio</label>
            <textarea name="bio" class="form-control" rows="3">{{ user.bio }}</textarea>
            <label>Photo de profil</label>
            <input type="file" name="photo" class="form-control">
            <div style="margin-top:15px;">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="{% url 'profil' %}" class="btn btn-secondary" style="margin-left:10px;">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
