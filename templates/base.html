<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MentorLink{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f4f4; font-family: Arial, sans-serif; }
        .navbar { background: #2c3e50; }
        .navbar a { color: white; text-decoration: none; padding: 10px 15px; display: inline-block; }
        .navbar a:hover { background: #1a252f; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #2c3e50; color: white; }
        .btn-primary:hover { background: #1a252f; }
        .btn-secondary { background: #ccc; color: #333; }
        .form-control { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px; }
        .alert { padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="max-width:1000px; margin:0 auto; padding:0 15px;">
        <a href="{% url 'home' %}"><strong>MentorLink</strong></a>
        {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">Tableau de bord</a>
        <a href="{% url 'liste_conversations' %}">Messages</a>
        <a href="{% url 'profil' %}">Mon profil</a>
        <a href="{% url 'deconnexion' %}">Déconnexion</a>
        {% else %}
        <a href="{% url 'connexion' %}">Connexion</a>
        <a href="{% url 'inscription' %}">Inscription</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
