{% extends "base.html" %}
{% block title %}Trouver un mentor - MentorLink{% endblock %}

{% block content %}
<div style="max-width:700px; margin:0 auto;">
    <div class="card">
        <h3 style="margin-bottom:20px;">Trouver un mentor</h3>
        <form method="post">
            {% csrf_token %}
            <label>Sélectionne ta demande</label>
            <select name="demande_id" class="form-control" required>
                <option value="">-- Choisir une demande --</option>
                {% for demande in demandes %}
                <option value="{{ demande.id }}">{{ demande.titre }}</option>
                {% endfor %}
            </select>
            {% if not demandes %}
            <p style="color:#666;">Tu n'as pas encore de demande. 
                <a href="{% url 'creer_demande' %}">Créer une demande</a>
            </p>
            {% endif %}
            <div style="margin-top:15px;">
                <button type="submit" class="btn btn-primary">Lancer le matching</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="margin-left:10px;">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
